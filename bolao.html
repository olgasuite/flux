  const ref  = doc(db, 'bolao', 'copa2026');

  let firstSnap = true;
  onSnapshot(ref, snap => {
    window._docExists = snap.exists();
    window.applyRemoteCL(snap.exists() ? snap.data() : null);
    firstSnap = false;

    for (const s of sels) {
      const st = CL[g][s];
      let pts = 0, estado = 'pendente';
      if (st === true)  { pts = gd.pa;  estado = 'acerto'; }
      else if (st === false) { pts = gd.pp; estado = 'erro'; }
      gpts += pts; items.push({s, pts, estado});
    }
    total += gpts; det[g] = {gpts, items};
  }
  return {total, det};
}

function ranking() {
  return PART.map(p => ({...p, ...calcPts(p)})).sort((a,b) => b.total - a.total);
}

// ════════════════════════════════════════════
// RENDER RANKING
// ════════════════════════════════════════════
function renderRanking() {
  const r = ranking();
  const max = r[0]?.total || 1;
  // Agrupar por pontos para mostrar seções
  let html = '<table class="eli-table">';
  html += `<tr class="eli-section-hdr"><td colspan="3">CLASSIFICAÇÃO PARCIAL · GRUPOS A-L</td></tr>`;

  let posAtual = 1;
  r.forEach((p, i) => {
    if (i > 0 && r[i-1].total !== p.total) posAtual = i + 1;
    html += `<tr class="eli-row" onclick="irPalpites('${p.nome}')" style="cursor:pointer">
      <td class="cel-num">${posAtual}</td>
      <td style="padding:0;width:100%">
        <span class="cel-nome" style="background:#1a4e1a;color:#e0e0e0;width:100%;display:block">${p.nome}</span>
      </td>
      <td class="cel-pts">${p.total}</td>
    </tr>`;
  });

  html += '</table>';
  document.getElementById('panel-ranking').innerHTML = html;
}

// ════════════════════════════════════════════
// RENDER GRUPOS
// ════════════════════════════════════════════
function renderGrupos() {
  const letras = Object.keys(GRUPOS);
  let html = '<div class="grupos-2col">';

  for (const letra of letras) {
    const g = GRUPOS[letra];
    html += `<div class="grupo-bloco">
      <div class="grupo-hdr">
        <span>GRP ${letra}</span>
        <span class="grupo-regra">${g.regra}</span>
      </div>`;

    for (const s of g.sels) {
      const st = CL[letra][s];
      const cls = st===true?'ok':st===false?'out':'';
      const chk = st===true?'checked':'';
      const opacity = st===false ? 'opacity:0.35;' : '';
      const cursor = IS_ADMIN ? 'pointer' : 'default';
      const click = IS_ADMIN ? `onclick="cycleClass('${letra}','${s}')"` : '';
      html += `<div class="sel-label ${cls}" style="cursor:${cursor}" ${click}>
        <input type="checkbox" class="sel-check" ${chk} disabled style="cursor:${cursor};opacity:0.7">
        <span class="sel-nome-block" style="${nomeStyle(s)};${opacity}">${s.toUpperCase()}</span>
      </div>`;
    }
    html += `</div>`;
  }

  html += '</div>';
  if (IS_ADMIN) html = '<div style="padding:6px 8px;font-size:9px;letter-spacing:1px;color:#d4b84a;background:#0a3d0a;border-bottom:1px solid #2a6e2a">MODO ADMIN · toque num time: classificado → eliminado → pendente</div>' + html;
  document.getElementById('panel-grupos').innerHTML = html;
}

function toggle(g, s, v) {
  CL[g][s] = v ? true : false;
  renderRanking();
  const sel = document.getElementById('psel');
  if (sel && sel.value) renderDetalhe(sel.value);
  atualizaSelectPts();
}

// ════════════════════════════════════════════
// RENDER PALPITES
// ════════════════════════════════════════════
function initPalpitesPanel() {
  const r = ranking();
  const sel = document.getElementById('psel');
  const cur = sel ? sel.value : '';
  atualizaSelectPts();
  const nome = (cur && PART.find(x => x.nome === cur)) ? cur : r[0].nome;
  document.getElementById('psel').value = nome;
  renderDetalhe(nome);
}

function atualizaSelectPts() {
  const r = ranking();
  const sel = document.getElementById('psel');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = r.map(p => `<option value="${p.nome}">${p.nome} · ${p.total}pts</option>`).join('');
  if (cur) sel.value = cur;
}

function renderDetalhe(nome) {
  const p = PART.find(x => x.nome === nome);
  if (!p) return;
  const {total, det} = calcPts(p);

  let html = '<table class="eli-table">';

  for (const [g, info] of Object.entries(det)) {
    const pending = info.items.every(i => i.estado==='pendente');
    const ptsStr = pending ? '?' : (info.gpts >= 0 ? '+'+info.gpts : ''+info.gpts);
    const ptsColor = pending ? '#3a7e3a' : info.gpts > 0 ? '#00ff41' : info.gpts < 0 ? '#ff4444' : '#888';

    html += `<tr class="eli-section-hdr"><td colspan="3">GRUPO ${g} <span style="float:right;color:${ptsColor}">${ptsStr} pts</span></td></tr>`;

    for (const item of info.items) {
      const icon  = item.estado==='acerto'?'✓':item.estado==='erro'?'✗':'·';
      const icolor= item.estado==='acerto'?'#00ff41':item.estado==='erro'?'#ff4444':'#555';
      const pStr  = item.estado==='pendente'?'?':(item.pts>=0?'+'+item.pts:''+item.pts);
      const pcolor= item.estado==='acerto'?'#00ff41':item.estado==='erro'?'#ff4444':'#555';

      // Cor do país: plena se acerto, escurecida se erro, cinza se pendente
      let bg2 = bg(item.s), fg2 = fg(item.s);
      if (item.estado === 'erro') { bg2 = '#2a0a0a'; fg2 = '#552222'; }
      if (item.estado === 'pendente') { bg2 = '#1a2e1a'; fg2 = '#3a5e3a'; }

      html += `<tr class="eli-row">
        <td style="padding:0;width:100%" colspan="1">
          <span class="cel-nome" style="background:${bg2};color:${fg2};width:100%">${item.s.toUpperCase()}</span>
        </td>
        <td class="cel-status" style="color:${icolor};background:#0a1a0a">${icon}</td>
        <td class="cel-pts" style="color:${pcolor};background:#0a1a0a">${pStr}</td>
      </tr>`;
    }
  }

  // grupos sem palpite
  for (const letra of Object.keys(GRUPOS)) {
    if (!p.p[letra]) {
      html += `<tr class="eli-section-hdr"><td colspan="3">GRUPO ${letra} <span style="float:right;color:#2a5e2a">SEM PALPITE</span></td></tr>`;
    }
  }

  html += '</table>';
  html += `<div class="total-row"><span class="total-lbl">TOTAL PARCIAL</span><span class="total-val">${total} pts</span></div>`;

  document.getElementById('pdet').innerHTML = html;
  atualizaSelectPts();
  document.getElementById('psel').value = nome;
}

function irPalpites(nome) {
  showPanel('palpites');
  setTimeout(() => {
    document.getElementById('psel').value = nome;
    renderDetalhe(nome);
  }, 30);
}

// ════════════════════════════════════════════
// NAVEGAÇÃO
// ════════════════════════════════════════════
function showPanel(id) {
  currentPanel = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelector(`.tab[onclick="showPanel('${id}')"]`).classList.add('active');
  renderCurrentPanel();
}

function renderCurrentPanel() {
  if (currentPanel==='ranking')  renderRanking();
  if (currentPanel==='grupos')   renderGrupos();
  if (currentPanel==='palpites') initPalpitesPanel();
}

// ════════════════════════════════════════════
// FIRESTORE + ADMIN
// ════════════════════════════════════════════
function cycleClass(g, s) {
  if (!IS_ADMIN) return;
  const cur = CL[g][s];
  CL[g][s] = (cur === true) ? false : (cur === false) ? null : true;
  renderGrupos();
  window._saveCL(CL).catch(e => alert('Erro ao salvar: ' + e.message));
}

function applyRemoteCL(data) {
  if (data && data.CL) {
    for (const g of Object.keys(data.CL)) {
      if (CL[g]) for (const s of Object.keys(data.CL[g])) CL[g][s] = data.CL[g][s];
    }
  }
  renderCurrentPanel();
  maybeSeed();
}

function maybeSeed() {
  if (IS_ADMIN && window._docExists === false && !seeded) {
    seeded = true;
    window._saveCL(CL).catch(() => { seeded = false; });
  }
}

function handleAuth(user) {
  IS_ADMIN = !!user && (user.email || '').toLowerCase() === OWNER;
  const btn = document.getElementById('auth-btn');
  if (user && !IS_ADMIN) { btn.textContent = 'sem permissão'; btn.classList.remove('admin'); }
  else if (IS_ADMIN)     { btn.textContent = 'admin · sair'; btn.classList.add('admin'); }
  else                   { btn.textContent = 'entrar'; btn.classList.remove('admin'); }
  renderCurrentPanel();
  maybeSeed();
}

function onAuthBtn() {
  if (IS_ADMIN || document.getElementById('auth-btn').textContent === 'sem permissão') window._logout();
  else window._login();
}

window.applyRemoteCL = applyRemoteCL;
window.handleAuth = handleAuth;
window.cycleClass = cycleClass;
window.onAuthBtn = onAuthBtn;

renderRanking();
</script>
</body>
</html>
